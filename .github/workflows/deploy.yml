name: Build and deploy IPTV addon

on:
  workflow_dispatch:          # run manually from the Actions tab
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'       # rebuild daily so dead streams get refreshed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate static addon
        run: node build.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
      - id: deploy
        uses: actions/deploy-pages@v4
